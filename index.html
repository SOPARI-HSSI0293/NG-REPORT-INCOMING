<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Approval - PT. HSSI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f4f7f6;
        }
        #dashboard-section {
            display: none; 
        }
        .card-approval {
            border-left: 5px solid #0d6efd;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- ================= BAGIAN LOGIN ================= -->
    <div class="container mt-5" id="login-section">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-primary">PT. HSSI</h3>
                            <p class="text-muted">Portal Approval Terintegrasi</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            
                            <!-- Tombol Login dengan efek loading -->
                            <button type="button" class="btn btn-primary w-100" id="btnLogin" onclick="prosesLogin()">
                                <span id="loginText">Login</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </form>
                        <div id="loginAlert" class="alert alert-danger mt-3 d-none" role="alert">
                            <!-- Pesan error dari server akan muncul di sini -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= BAGIAN DASHBOARD ================= -->
    <div id="dashboard-section">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <span class="navbar-brand mb-0 h1">Portal Approval</span>
                <div class="d-flex align-items-center">
                    <span class="text-white me-3" id="userGreeting">Halo, User</span>
                    <button class="btn btn-sm btn-light" onclick="prosesLogout()">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Konten Utama -->
        <div class="container mt-4">
            <h4 class="mb-3">Daftar Antrean - <span id="userRoleBadge" class="badge bg-warning text-dark">Role</span></h4>
            
            <!-- Tempat kartu approval akan dirender -->
            <div id="listApproval">
                <!-- Contoh Dummy Data (Nanti akan dirender otomatis dari GAS) -->
                <div class="card shadow-sm card-approval">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                        <div class="mb-3 mb-md-0">
                            <h5 class="card-title mb-1">IQC-26-0084</h5>
                            <p class="card-text text-muted mb-0"><small>Customer: subur | Waktu Input: 08:30</small></p>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-secondary" onclick="previewData('IQC-26-0084', '')" title="Preview Data">
                                <i class="bi bi-file-earmark-text"></i> Preview
                            </button>
                            <button class="btn btn-success" onclick="approveData('IQC-26-0084')" title="Approve">
                                <i class="bi bi-check-circle"></i> Approve
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= LOGIK JAVASCRIPT ================= -->
    <script>
        // URL Google Apps Script Anda
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbw8II8xY8CS8mz5kIqI0FMw4HthAzQqINqwMBw73TcYO7or348xH2gQQzRk3C7uokJlzA/exec";

        function prosesLogin() {
            // Mengambil input dan langsung mengubah username menjadi huruf kecil (lowercase)
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            const btnLogin = document.getElementById('btnLogin');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            if(!user || !pass) {
                tampilkanError("Username dan Password wajib diisi.");
                return;
            }

            // Memunculkan status loading
            alertBox.classList.add('d-none');
            btnLogin.disabled = true;
            loginText.innerText = "Memproses...";
            loginSpinner.classList.remove('d-none');
            
            // Mengirim data ke Google Apps Script
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                // Mode text/plain digunakan agar tidak terblokir masalah CORS
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify({
                    action: "login",
                    username: user,
                    password: pass
                })
            })
            .then(response => response.json())
            .then(result => {
                // Mengembalikan tombol ke keadaan semula
                btnLogin.disabled = false;
                loginText.innerText = "Login";
                loginSpinner.classList.add('d-none');

                if(result.status === "success") {
                    // Menyimpan data sesi sementara di browser
                    sessionStorage.setItem("userName", result.data.nama);
                    sessionStorage.setItem("userRole", result.data.role);
                    
                    masukDashboard(result.data.nama, result.data.role);
                } else {
                    tampilkanError(result.message);
                }
            })
            .catch(error => {
                btnLogin.disabled = false;
                loginText.innerText = "Login";
                loginSpinner.classList.add('d-none');
                tampilkanError("Terjadi kesalahan jaringan. Coba lagi.");
            });
        }

        function tampilkanError(pesan) {
            const alertBox = document.getElementById('loginAlert');
            alertBox.innerText = pesan;
            alertBox.classList.remove('d-none');
        }

        function masukDashboard(nama, role) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            
            // Format kapital awal untuk nama
            const namaFormat = nama.charAt(0).toUpperCase() + nama.slice(1);
            document.getElementById('userGreeting').innerText = "Halo, " + namaFormat;
            document.getElementById('userRoleBadge').innerText = role;
        }

        function prosesLogout() {
            sessionStorage.clear();
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginAlert').classList.add('d-none');
        }

        function previewData(idLaporan, fileUrl) {
            if(fileUrl && fileUrl !== '') {
                window.open(fileUrl, '_blank');
            } else {
                alert("Simulasi Preview: Menampilkan PDF untuk ID " + idLaporan);
            }
        }

        function approveData(idLaporan) {
            let konfirmasi = confirm("Yakin ingin melakukan Approve untuk " + idLaporan + "?");
            if(konfirmasi) {
                alert(idLaporan + " berhasil di-approve! (Integrasi update data menyusul)");
            }
        }
    </script>
</body>
</html>
