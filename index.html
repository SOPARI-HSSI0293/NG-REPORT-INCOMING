<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Approval - PT. HSSI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        #dashboard-section { display: none; }
        .card-approval { border-left: 5px solid #0d6efd; margin-bottom: 15px; }
    </style>
</head>
<body>
    <!-- BAGIAN LOGIN -->
    <div class="container mt-5" id="login-section">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-primary">PT. HSSI</h3>
                            <p class="text-muted">Portal Approval Terintegrasi</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="button" class="btn btn-primary w-100" id="btnLogin" onclick="prosesLogin()">
                                <span id="loginText">Login</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </form>
                        <div id="loginAlert" class="alert alert-danger mt-3 d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BAGIAN DASHBOARD -->
    <div id="dashboard-section">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <span class="navbar-brand mb-0 h1">Portal Approval</span>
                <div class="d-flex align-items-center">
                    <span class="text-white me-3" id="userGreeting">Halo, User</span>
                    <button class="btn btn-sm btn-light" onclick="prosesLogout()">Logout</button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <h4 class="mb-3">Daftar Antrean - <span id="userRoleBadge" class="badge bg-warning text-dark">Role</span></h4>
            
            <div id="loadingData" class="text-center my-5 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Mengambil data antrean real-time...</p>
            </div>

            <div id="listApproval"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbw8II8xY8CS8mz5kIqI0FMw4HthAzQqINqwMBw73TcYO7or348xH2gQQzRk3C7uokJlzA/exec";

        function prosesLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            const btnLogin = document.getElementById('btnLogin');
            
            if(!user || !pass) return tampilkanError("Username dan Password wajib diisi.");

            alertBox.classList.add('d-none');
            btnLogin.disabled = true;
            document.getElementById('loginText').innerText = "Memproses...";
            document.getElementById('loginSpinner').classList.remove('d-none');
            
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "login", username: user, password: pass })
            })
            .then(response => response.json())
            .then(result => {
                btnLogin.disabled = false;
                document.getElementById('loginText').innerText = "Login";
                document.getElementById('loginSpinner').classList.add('d-none');

                if(result.status === "success") {
                    sessionStorage.setItem("userName", result.data.nama);
                    sessionStorage.setItem("userRole", result.data.role);
                    masukDashboard(result.data.nama, result.data.role);
                } else {
                    tampilkanError(result.message);
                }
            })
            .catch(error => {
                btnLogin.disabled = false;
                document.getElementById('loginText').innerText = "Login";
                document.getElementById('loginSpinner').classList.add('d-none');
                tampilkanError("Terjadi kesalahan jaringan.");
            });
        }

        function tampilkanError(pesan) {
            const alertBox = document.getElementById('loginAlert');
            alertBox.innerText = pesan;
            alertBox.classList.remove('d-none');
        }

        function masukDashboard(nama, role) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            
            document.getElementById('userGreeting').innerText = "Halo, " + nama.charAt(0).toUpperCase() + nama.slice(1);
            document.getElementById('userRoleBadge').innerText = role.toUpperCase();

            loadData(role.toUpperCase());
        }

        function prosesLogout() {
            sessionStorage.clear();
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginAlert').classList.add('d-none');
            document.getElementById('listApproval').innerHTML = '';
        }

        function loadData(role) {
            const listContainer = document.getElementById('listApproval');
            const loadingIndicator = document.getElementById('loadingData');
            
            listContainer.innerHTML = '';
            loadingIndicator.classList.remove('d-none');

            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "getData", role: role })
            })
            .then(response => response.json())
            .then(result => {
                loadingIndicator.classList.add('d-none');
                if (result.status === "success") {
                    renderCards(result.data.items, role);
                } else {
                    listContainer.innerHTML = `<div class="alert alert-danger">${result.message}</div>`;
                }
            })
            .catch(error => {
                loadingIndicator.classList.add('d-none');
                listContainer.innerHTML = `<div class="alert alert-danger">Gagal menghubungi server untuk mengambil data.</div>`;
            });
        }

        function renderCards(items, role) {
            const listContainer = document.getElementById('listApproval');
            
            if (!items || items.length === 0) {
                listContainer.innerHTML = '<div class="alert alert-info">Tidak ada antrean approval untuk Anda saat ini.</div>';
                return;
            }

            items.forEach(item => {
                let btnApprovalHTML = '';

                if (role === 'SALES') {
                    btnApprovalHTML = `
                        <div class="btn-group">
                            <button type="button" class="btn btn-success dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-check-circle"></i> Approve Action
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow">
                                <li><a class="dropdown-item" href="#" onclick="approveData('${item.id}', 'OK Proses, Part NG Claim Insurance', this)">OK Proses, Part NG Claim Insurance</a></li>
                                <li><a class="dropdown-item" href="#" onclick="approveData('${item.id}', 'OK Proses, Part NG Claim Maker', this)">OK Proses, Part NG Claim Maker</a></li>
                                <li><a class="dropdown-item" href="#" onclick="approveData('${item.id}', 'OK Proses, Part NG ScrapDown', this)">OK Proses, Part NG ScrapDown</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" onclick="approveData('${item.id}', 'Claim to Maker', this)">Claim to Maker</a></li>
                                <li><a class="dropdown-item text-danger" href="#" onclick="approveData('${item.id}', 'Claim to Insurance', this)">Claim to Insurance</a></li>
                            </ul>
                        </div>
                    `;
                } else {
                    btnApprovalHTML = `
                        <button class="btn btn-success" onclick="approveData('${item.id}', 'Approved', this)" title="Approve">
                            <i class="bi bi-check-circle"></i> Approve
                        </button>
                    `;
                }

                const cardHTML = `
                    <div class="card shadow-sm card-approval" id="card-${item.id}">
                        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                            <div class="mb-3 mb-md-0">
                                <h5 class="card-title mb-1">${item.id}</h5>
                                <p class="card-text text-muted mb-0"><small>${item.detail}</small></p>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-secondary" onclick="previewData('${item.id}', this)" title="Preview Data">
                                    <i class="bi bi-file-earmark-text"></i> <span class="btn-text">Preview</span>
                                </button>
                                ${btnApprovalHTML}
                            </div>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHTML;
            });
        }

        function previewData(idLaporan, btnElement) {
            const btnText = btnElement.querySelector('.btn-text');
            const originalIcon = btnElement.querySelector('i').className;
            
            btnElement.disabled = true;
            btnElement.querySelector('i').className = "spinner-border spinner-border-sm";
            btnText.innerText = " Mencari...";

            // Buka tab baru SEBELUM fetch untuk mencegah pop-up blocker browser
            const previewWindow = window.open('', '_blank');
            if (previewWindow) previewWindow.document.write('Memuat dokumen PDF untuk ' + idLaporan + '...');

            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "getPreview", id_laporan: idLaporan })
            })
            .then(response => response.json())
            .then(result => {
                btnElement.disabled = false;
                btnElement.querySelector('i').className = originalIcon;
                btnText.innerText = "Preview";

                if (result.status === "success") {
                    if (previewWindow) {
                        previewWindow.location.href = result.data.url; // Arahkan tab kosong tadi ke PDF
                    } else {
                        window.open(result.data.url, '_blank');
                    }
                } else {
                    if (previewWindow) previewWindow.close(); // Tutup tab kosong jika gagal
                    alert(result.message);
                }
            })
            .catch(error => {
                btnElement.disabled = false;
                btnElement.querySelector('i').className = originalIcon;
                btnText.innerText = "Preview";
                if (previewWindow) previewWindow.close();
                alert("Gagal menghubungi server untuk preview.");
            });
        }

        function approveData(idLaporan, statusApproval, btnElement) {
            let konfirmasi = confirm(`Yakin ingin memproses ID: ${idLaporan}\ndengan status: "${statusApproval}"?`);
            if(!konfirmasi) return;

            const cardElement = document.getElementById('card-' + idLaporan);
            cardElement.style.opacity = '0.5';
            
            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ 
                    action: "approve", 
                    id_laporan: idLaporan,
                    role: sessionStorage.getItem("userRole"),
                    username: sessionStorage.getItem("userName"),
                    status: statusApproval 
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    cardElement.remove();
                    // Cek jika antrean habis
                    const container = document.getElementById('listApproval');
                    if(container.children.length === 0) {
                        container.innerHTML = '<div class="alert alert-info">Tidak ada antrean approval untuk Anda saat ini.</div>';
                    }
                } else {
                    cardElement.style.opacity = '1';
                    alert("Gagal: " + result.message);
                }
            })
            .catch(error => {
                cardElement.style.opacity = '1';
                alert("Terjadi kesalahan jaringan saat menyimpan approval.");
            });
        }
    </script>
</body>
</html>
